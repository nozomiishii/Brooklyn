name: Brooklyn
options:
  bundleIdPrefix: dev.nozomiishii
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "26.4"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    ARCHS: arm64
    MARKETING_VERSION: "0.1.21" # x-release-please-version

targets:
  Brooklyn:
    type: bundle
    platform: macOS
    sources:
      - path: Brooklyn/Sources
      - path: Brooklyn/ConfigureSheet
      - path: Brooklyn/Resources/Animations
        type: folder
        buildPhase: resources
    settings:
      base:
        PRODUCT_NAME: Brooklyn
        PRODUCT_BUNDLE_IDENTIFIER: dev.nozomiishii.brooklyn
        WRAPPER_EXTENSION: saver
        INFOPLIST_FILE: Brooklyn/Info.plist
        GENERATE_INFOPLIST_FILE: false
        COMBINE_HIDPI_IMAGES: true
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks @loader_path/../Frameworks"
    dependencies:
      - framework: ScreenSaver.framework
        embed: false
      - sdk: AVFoundation.framework
      - sdk: SwiftUI.framework

  Canvas:
    type: application
    platform: macOS
    sources:
      - path: Canvas
      - path: Brooklyn/Sources
      - path: Brooklyn/ConfigureSheet
      - path: Brooklyn/Resources/Animations
        type: folder
        buildPhase: resources
    settings:
      base:
        PRODUCT_NAME: Canvas
        PRODUCT_BUNDLE_IDENTIFIER: dev.nozomiishii.brooklyn.canvas
        INFOPLIST_FILE: Canvas/Info.plist
        GENERATE_INFOPLIST_FILE: false
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
    dependencies:
      - framework: ScreenSaver.framework
        embed: false
      - sdk: AVFoundation.framework
      - sdk: SwiftUI.framework

  BrooklynTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: BrooklynTests
      - path: Brooklyn/Sources
      - path: Brooklyn/ConfigureSheet
      - path: Brooklyn/Resources/Animations
        type: folder
        buildPhase: resources
    settings:
      base:
        PRODUCT_NAME: BrooklynTests
        PRODUCT_BUNDLE_IDENTIFIER: dev.nozomiishii.brooklyn.tests
        GENERATE_INFOPLIST_FILE: true
    dependencies:
      - framework: ScreenSaver.framework
        embed: false
      - sdk: AVFoundation.framework
      - sdk: SwiftUI.framework
