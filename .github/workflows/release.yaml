name: Release

on:
  workflow_dispatch:
  push:
    branches: [main]

defaults:
  run:
    shell: bash

# 同時実行を防止し、release-pr が未完了のリリースを参照する競合を回避する
concurrency:
  group: release
  cancel-in-progress: false

# デフォルト権限を無効化し、各ジョブで必要最小限の権限のみ付与する
permissions: {}

jobs:
  # release PR がマージされていれば draft release + tag を作成
  create-draft-release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write  # required by release-please to create draft releases and tags
      pull-requests: write  # required by release-please to create/update release PRs

    outputs:
      release_created: ${{ steps.detect.outputs.release_created }}
      tag_name: ${{ steps.detect.outputs.tag_name }}

    steps:
      - name: Load secrets from 1Password
        id: secrets
        uses: 1password/load-secrets-action@92467eb28f72e8255933372f1e0707c567ce2259 # v4
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          APP_ID: op://github-app/nozomiishii-release/username
          APP_PRIVATE_KEY: op://github-app/nozomiishii-release/credential

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ steps.secrets.outputs.APP_ID }}
          private-key: ${{ steps.secrets.outputs.APP_PRIVATE_KEY }}

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run release-please github-release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO_URL: ${{ github.repository }}
        run: |
          npx --yes release-please@17.6.0 github-release \
            --repo-url="${REPO_URL}" \
            --config-file=.github/.release-please-config.json \
            --manifest-file=.github/.release-please-manifest.json \
            --token="${GITHUB_TOKEN}"

      - name: Detect created release
        id: detect
        run: |
          VERSION=$(jq -r '."."' .github/.release-please-manifest.json)
          TAG_NAME="v${VERSION}"
          if gh release view "${TAG_NAME}" --json isDraft --jq '.isDraft' 2>/dev/null | grep -q 'true'; then
            echo "release_created=true" >> "$GITHUB_OUTPUT"
            echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "release_created=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

  # ビルド + アセット upload + draft release を publish
  upload-assets:
    needs: create-draft-release
    if: needs.create-draft-release.outputs.release_created == 'true'
    runs-on: macos-26
    timeout-minutes: 30
    permissions:
      contents: write  # required by gh release upload/edit to publish release assets
    steps:
      - name: Load secrets from 1Password
        id: secrets
        uses: 1password/load-secrets-action@92467eb28f72e8255933372f1e0707c567ce2259 # v4
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          APP_ID: op://github-app/nozomiishii-release/username
          APP_PRIVATE_KEY: op://github-app/nozomiishii-release/credential

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ steps.secrets.outputs.APP_ID }}
          private-key: ${{ steps.secrets.outputs.APP_PRIVATE_KEY }}

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.create-draft-release.outputs.tag_name }}
          persist-credentials: false

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build
        run: make build

      - name: Run tests
        run: make test

      - name: Package .saver
        run: |
          cd build/Build/Products/Release
          zip -r Brooklyn.saver.zip Brooklyn.saver

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TAG_NAME: ${{ needs.create-draft-release.outputs.tag_name }}
        run: |
          gh release upload "${TAG_NAME}" \
            build/Build/Products/Release/Brooklyn.saver.zip

      - name: Publish Release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TAG_NAME: ${{ needs.create-draft-release.outputs.tag_name }}
        run: |
          gh release edit "${TAG_NAME}" \
            --draft=false

  # publish 後に次の release PR を作成/更新
  release-pr:
    needs: [create-draft-release, upload-assets]
    if: ${{ always() && !cancelled() && needs.upload-assets.result != 'failure' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write  # required by release-please to create the release PR branch
      pull-requests: write  # required by release-please to create/update release PRs

    steps:
      - name: Load secrets from 1Password
        id: secrets
        uses: 1password/load-secrets-action@92467eb28f72e8255933372f1e0707c567ce2259 # v4
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          APP_ID: op://github-app/nozomiishii-release/username
          APP_PRIVATE_KEY: op://github-app/nozomiishii-release/credential

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ steps.secrets.outputs.APP_ID }}
          private-key: ${{ steps.secrets.outputs.APP_PRIVATE_KEY }}

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run release-please release-pr
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO_URL: ${{ github.repository }}
        run: |
          npx --yes release-please@17.6.0 release-pr \
            --repo-url="${REPO_URL}" \
            --config-file=.github/.release-please-config.json \
            --manifest-file=.github/.release-please-manifest.json \
            --token="${GITHUB_TOKEN}"

  homebrew-update:
    needs: [create-draft-release, upload-assets]
    if: needs.create-draft-release.outputs.release_created == 'true'
    runs-on: macos-26
    timeout-minutes: 10
    concurrency:
      group: homebrew-update
      cancel-in-progress: false
    permissions:
      contents: read

    steps:
      - name: Load secrets from 1Password
        id: secrets
        uses: 1password/load-secrets-action@92467eb28f72e8255933372f1e0707c567ce2259 # v4
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          APP_ID: op://github-app/nozomiishii-release/username
          APP_PRIVATE_KEY: op://github-app/nozomiishii-release/credential

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ steps.secrets.outputs.APP_ID }}
          private-key: ${{ steps.secrets.outputs.APP_PRIVATE_KEY }}
          owner: nozomiishii
          repositories: homebrew-tap

      - name: Bump cask and enable auto-merge
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TAG_NAME: ${{ needs.create-draft-release.outputs.tag_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          brew tap nozomiishii/homebrew-tap

          # `brew bump-cask-pr` の出力 (stdout/stderr) に作成 PR の URL が含まれる。
          # `gh pr list` でタイトル検索する代わりにそれを直接捕捉して
          # `gh pr merge` に渡すことで、push 直後の検索レース・誤解決を避ける。
          BUMP_OUTPUT=$(brew bump-cask-pr \
            --no-browse \
            --no-fork \
            --tap=nozomiishii/homebrew-tap \
            --version="$VERSION" \
            brooklyn 2>&1)
          echo "$BUMP_OUTPUT"

          PR_URL=$(echo "$BUMP_OUTPUT" \
            | grep -oE 'https://github\.com/nozomiishii/homebrew-tap/pull/[0-9]+' \
            | tail -1)

          if [ -z "$PR_URL" ]; then
            echo "::warning::PR URL not found in brew output; auto-merge skipped"
            exit 0
          fi

          gh pr merge "$PR_URL" --auto --squash
