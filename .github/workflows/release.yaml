name: Release

on:
  workflow_dispatch:
  push:
    branches: [main]

defaults:
  run:
    shell: bash

# 同時実行を防止し、release-pr が未完了のリリースを参照する競合を回避する
concurrency:
  group: release
  cancel-in-progress: false

# デフォルト権限を無効化し、各ジョブで必要最小限の権限のみ付与する
permissions: {}

jobs:
  # release PR がマージされていれば draft release + tag を作成
  create-draft-release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write

    outputs:
      release_created: ${{ steps.detect.outputs.release_created }}
      tag_name: ${{ steps.detect.outputs.tag_name }}

    steps:
      - name: Load secrets from 1Password
        id: secrets
        uses: 1password/load-secrets-action@92467eb28f72e8255933372f1e0707c567ce2259 # v4
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          APP_ID: op://github-app/nozomiishii-release/username
          APP_PRIVATE_KEY: op://github-app/nozomiishii-release/credential

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        with:
          app-id: ${{ steps.secrets.outputs.APP_ID }}
          private-key: ${{ steps.secrets.outputs.APP_PRIVATE_KEY }}

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Run release-please github-release
        run: |
          npx --yes release-please@17.6.0 github-release \
            --repo-url="${{ github.repository }}" \
            --config-file=.github/.release-please-config.json \
            --manifest-file=.github/.release-please-manifest.json \
            --token="${GITHUB_TOKEN}"
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Detect created release
        id: detect
        run: |
          VERSION=$(jq -r '."."' .github/.release-please-manifest.json)
          TAG_NAME="v${VERSION}"
          if gh release view "${TAG_NAME}" --json isDraft --jq '.isDraft' 2>/dev/null | grep -q 'true'; then
            echo "release_created=true" >> "$GITHUB_OUTPUT"
            echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "release_created=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

  # ビルド + アセット upload + draft release を publish
  upload-assets:
    needs: create-draft-release
    if: needs.create-draft-release.outputs.release_created == 'true'
    runs-on: macos-26
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Load secrets from 1Password
        id: secrets
        uses: 1password/load-secrets-action@92467eb28f72e8255933372f1e0707c567ce2259 # v4
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          APP_ID: op://github-app/nozomiishii-release/username
          APP_PRIVATE_KEY: op://github-app/nozomiishii-release/credential

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        with:
          app-id: ${{ steps.secrets.outputs.APP_ID }}
          private-key: ${{ steps.secrets.outputs.APP_PRIVATE_KEY }}

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.create-draft-release.outputs.tag_name }}

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build
        run: make build

      - name: Run tests
        run: make test

      - name: Package .saver
        run: |
          cd build/Build/Products/Release
          zip -r Brooklyn.saver.zip Brooklyn.saver

      - name: Upload to GitHub Release
        run: |
          gh release upload "${{ needs.create-draft-release.outputs.tag_name }}" \
            build/Build/Products/Release/Brooklyn.saver.zip
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Publish Release
        run: |
          gh release edit "${{ needs.create-draft-release.outputs.tag_name }}" \
            --draft=false
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

  # publish 後に次の release PR を作成/更新
  release-pr:
    needs: [create-draft-release, upload-assets]
    if: ${{ always() && !cancelled() && needs.upload-assets.result != 'failure' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Load secrets from 1Password
        id: secrets
        uses: 1password/load-secrets-action@92467eb28f72e8255933372f1e0707c567ce2259 # v4
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          APP_ID: op://github-app/nozomiishii-release/username
          APP_PRIVATE_KEY: op://github-app/nozomiishii-release/credential

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        with:
          app-id: ${{ steps.secrets.outputs.APP_ID }}
          private-key: ${{ steps.secrets.outputs.APP_PRIVATE_KEY }}

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Run release-please release-pr
        run: |
          npx --yes release-please@17.6.0 release-pr \
            --repo-url="${{ github.repository }}" \
            --config-file=.github/.release-please-config.json \
            --manifest-file=.github/.release-please-manifest.json \
            --token="${GITHUB_TOKEN}"
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

  homebrew-update:
    needs: [create-draft-release, upload-assets]
    if: needs.create-draft-release.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: homebrew-update
      cancel-in-progress: false
    permissions:
      contents: read

    steps:
      - name: Load secrets from 1Password
        id: secrets
        uses: 1password/load-secrets-action@92467eb28f72e8255933372f1e0707c567ce2259 # v4
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          APP_ID: op://github-app/nozomiishii-release/username
          APP_PRIVATE_KEY: op://github-app/nozomiishii-release/credential

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        with:
          app-id: ${{ steps.secrets.outputs.APP_ID }}
          private-key: ${{ steps.secrets.outputs.APP_PRIVATE_KEY }}
          owner: nozomiishii
          repositories: homebrew-tap

      - name: Download release asset
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TAG_NAME: ${{ needs.create-draft-release.outputs.tag_name }}
        run: |
          gh release download "$TAG_NAME" \
            --repo nozomiishii/Brooklyn \
            --pattern "Brooklyn.saver.zip" \
            --dir /tmp

      - name: Calculate sha256
        id: hash
        run: echo "sha256=$(sha256sum /tmp/Brooklyn.saver.zip | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Clone homebrew-tap
        run: git clone https://github.com/nozomiishii/homebrew-tap.git /tmp/homebrew-tap

      - name: Update cask
        working-directory: /tmp/homebrew-tap
        env:
          TAG_NAME: ${{ needs.create-draft-release.outputs.tag_name }}
          SHA256: ${{ steps.hash.outputs.sha256 }}
        run: |
          VERSION="${TAG_NAME#v}"
          sed -i "s/version \".*\"/version \"$VERSION\"/" Casks/brooklyn.rb
          sed -i "s/sha256 \".*\"/sha256 \"$SHA256\"/" Casks/brooklyn.rb

      - name: Commit and push
        working-directory: /tmp/homebrew-tap
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TAG_NAME: ${{ needs.create-draft-release.outputs.tag_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          git config user.name "nozomiishii-release[bot]"
          git config user.email "nozomiishii-release[bot]@users.noreply.github.com"
          git add Casks/brooklyn.rb
          git commit -m "brooklyn $VERSION"
          AUTH=$(echo -n "x-access-token:${GH_TOKEN}" | base64)
          git -c "http.extraheader=Authorization: Basic ${AUTH}" push origin main
