name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build Brooklyn.saver
        run: |
          xcodebuild \
            -project Brooklyn.xcodeproj \
            -scheme Brooklyn \
            -configuration Release \
            -arch arm64 -arch x86_64 \
            ONLY_ACTIVE_ARCH=NO \
            -derivedDataPath build

      - name: Verify Universal Binary
        run: |
          lipo -info build/Build/Products/Release/Brooklyn.saver/Contents/MacOS/Brooklyn
          lipo -info build/Build/Products/Release/Brooklyn.saver/Contents/MacOS/Brooklyn | grep "arm64 x86_64"

      - name: Verify animations are bundled
        run: |
          count=$(ls build/Build/Products/Release/Brooklyn.saver/Contents/Resources/Animations/*.mp4 | wc -l | tr -d ' ')
          echo "Found $count MP4 files"
          [ "$count" -eq 75 ] || (echo "Expected 75 MP4 files, got $count" && exit 1)

      - name: Run tests
        run: |
          xcodebuild test \
            -project Brooklyn.xcodeproj \
            -scheme BrooklynTests \
            -destination 'platform=macOS' \
            -derivedDataPath build
